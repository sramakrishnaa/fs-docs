[project]
site_name = "FS Docs"
site_author = "Ramakrishna Sangamreddy"
site_url = "https://sramakrishnaa.github.io/java-fullstack-notes/"
copyright = "Copyright © 2026 Ramakrishna Sangamreddy"




[project.theme]
name = "material"
language = "en"
features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.tracking",
    "navigation.tabs",
    "navigation.indexes",
    "navigation.top",
    "navigation.path",
    "toc.follow",
    "content.tabs.link",
    "content.code.copy",
    "content.code.annotate",
    "content.action.edit",
    "content.action.view",
    "search.highlight",
    "search.share",
    "search.suggest",
]

[project.theme.icon]
edit = "material/pencil"
view = "material/eye"


[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"
